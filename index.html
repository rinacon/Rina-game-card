    <style>
        :root {
            --dark-bg: #0f0f0f;
            --gold: #bfa071;
            --text: #e0e0e0;
            --card-bg: rgba(30, 30, 30, 0.9);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            font-family: 'Amiri', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* العنوان العلوي (TXT في رسمك) */ 
        .game-title {
    font-family: 'Cinzel', serif; /* الخط الجديد */

    color: var(--gold);

        /* حاوية الملفات أو القضايا */
        .cases-container {
            display: flex;

            gap: 25px;
            width: 100%;
            max-width: 800px;
            padding-bottom: 100px;


          
        }


        /* تصميم المستطيل (البطاقة) من رسمك */
        .case-card {
            background-color: var(--card-bg);

        }

        .case-card:hover {
            transform: scale(1.02);
            border-color: var(--gold);
        }

        /* قسم الصورة في البطاقة */
        .case-image {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--gold);

        }

            flex-grow: 1;
        }

        .case-info h2 {
            margin: 0 0 10px 0;
            color: var(--gold);
        }

        .case-info p {
            margin: 0;
            font-size: 0.95rem;
            color: #bbb;
            line-height: 1.5;
        }

        /* زر ابدأ */
        .start-btn {

            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .start-btn:hover {

        }
        /* تأثير الأيقونات الساقطة في الخلفية */
.background-elements {

    top: -50px;
    left: 0;

    height: 100%;
    z-index: -1; /* لتكون خلف كل شيء */
    overflow: hidden;
    pointer-events: none;
}

.emoji {
    position: absolute;
    color: rgba(191, 160, 113, 0.2); /* لون ذهبي شفاف جداً */
    font-size: 24px;
    user-select: none;
    animation: fall linear infinite;
    filter: drop-shadow(0 0 5px rgba(191, 160, 113, 0.5)); /* تأثير اللمعان */
}

/* تنسيق الرموز المتساقطة (الخلفية) */
.emoji {

    top: -50px;

    pointer-events: none;

}

@keyframes fall {

    <script>

        let typingTimer; // متغير للتحكم في سرعة الكتابة وإيقافها عند الحاجة

function typeWriter(text, elementId, speed) {
    let i = 0;
    const element = document.getElementById(elementId);
    element.innerHTML = ""; // تفريغ النص القديم قبل البدء
    
    // إيقاف أي عملية كتابة سابقة إذا ضغط المستخدم بسرعة
    clearTimeout(typingTimer);

    function type() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            typingTimer = setTimeout(type, speed);
        }
    }
    type();
}


function closeOverlay() {
    document.getElementById('message-overlay').style.display = "none";
    clearTimeout(typingTimer); // إيقاف الكتابة إذا أغلق المستخدم الشاشة

    }

// دالة لقلب البطاقة عند النقر عليها
function flipCard() {
    const card = document.getElementById('card-inner');
   if (card) card.classList.toggle('is-flipped'); // يضيف أو يحذف كلاس الدوران
}

        function startGame(caseId) {
          
    const overlay = document.getElementById('message-overlay');
    const textElement = document.getElementById('overlay-text');
    const cardBack = document.getElementById('card-back-view');
        const cardInner = document.getElementById('card-inner');
    const btn = document.getElementById('understand-btn');
    const btn2 = document.getElementById('btn-card-2');
    const btn3 = document.getElementById('btn-card-3');
   
    // تصفير كل شيء قبل البدء
    textElement.innerText = "";
       if(cardInner){
        cardInner.style.display="none";
        cardInner.classList.remove('is-flipped');

    overlay.style.display = "flex";

    if (caseId === 1) {
        // بدلاً من النص، نظهر ظهر البطاقة
        if(cardInner) cardInner.style.display = "block";
 
        textElement.innerText = "اضغط على البطاقة ";
        btn2.style.display = "flex";
        btn3.style.display = "flex";
              if(btn) btn.style.display = "block";

    } else {
        let message = "";
        if (caseId === 2) message = "قريباً جداً لا تقلق 😉";
        else if (caseId === 3) message = "لقد أخبرتك قريباً، لماذا تصر؟ 🙄";
        else if (caseId === 4) message = "لقد أخبرتك قريباً! 😠";
        else if (caseId === 5) message = "يا إلهي هذا الأبله لا يفهم شيئاً بالرغم من أنه محقق بارع 😎✨";

        btn2.style.display = "none";

function createEmoji() {
    const emoji = document.createElement('div');
    emoji.classList.add('emoji');

    emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
    
    // مكان الظهور العشوائي (من اليسار لليمين)
    emoji.style.left = Math.random() * 100 + "vw";
    
    // سرعة السقوط العشوائية (بين 5 و 15 ثانية)
    const duration = Math.random() * 10 + 5;
    emoji.style.animationDuration = duration + "s";
    
    // حجم عشوائي
    emoji.style.fontSize = Math.random() * 20 + 20 + "px";
    
    bgContainer.appendChild(emoji);
    
    // حذف العنصر بعد انتهاء الحركة لتوفير الذاكرة
    setTimeout(() => {
        emoji.remove();
    }, duration * 1000);
}

function showSurprise() {
    const table = document.querySelector('.main-card-table');
    
    // تنظيف الواجهة - لاحظي أن جميع الأسطر لها نفس الكلاس الآن
    table.innerHTML = `
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; width: 100%;">
            <p id="line1" class="golden-typewriter"></p>
            <p id="line2" class="golden-typewriter"></p>
            <p id="line3" class="golden-typewriter"></p>
            <p id="line4" class="golden-typewriter"></p>
            <button id="final-btn" class="btn-detective" onclick="location.reload()" style="display:none; margin-top: 40px;">فهمت</button>
        </div>
    `;

    const messages = [
        { id: "line1", text: "🎉 لقد فزت مبرووووك 🎉" },
        { id: "line2", text: "اليس كذلك؟ 🤔" },
        { id: "line3", text: "هل انت متاكد 😟" },
        { id: "line4", text: "امزح امزح 😂 لقد فزت وتعلمت الان نوع جديد من الجرائم وعقوبتها 📖⚖️ نلتقي في قضية اخرى 🔍" }
    ];

    let currentMsgIndex = 0;

    function typeMessage(index) {
        if (index >= messages.length) {
            // إظهار زر فهمت في النهاية بنعومة
            const btn = document.getElementById('final-btn');
            btn.style.display = "block";
            return;
        }

        let charIndex = 0;
        let msg = messages[index];
        let element = document.getElementById(msg.id);

        function charByChar() {
            if (charIndex < msg.text.length) {
                element.innerHTML += msg.text.charAt(charIndex);
                charIndex++;
                setTimeout(charByChar, 40); // سرعة الكتابة
            } else {
                // انتظار ثانية قبل السطر التالي
                setTimeout(() => {
                    typeMessage(index + 1);
                }, 1000);
            }
        }
        charByChar();
    }

    typeMessage(0);
}

function changeCard(frontImg, backImg, label2, label3, nextAction2, nextAction3) {
    const cardInner = document.getElementById('card-inner');
    const fImg = document.querySelector('.card-front img');
    const bImg = document.querySelector('.card-back img');
    const btn2 = document.getElementById('btn-card-2');
    const btn3 = document.getElementById('btn-card-3');
    const btn2Label = btn2.querySelector('.choice-label');
    const btn3Label = btn3.querySelector('.choice-label');

    // 1. إعادة قلب البطاقة للوجه الأمامي
    cardInner.classList.remove('is-flipped');

    setTimeout(() => {
        // 2. تغيير صور البطاقة
        if(fImg) fImg.src = frontImg;
        if(bImg) bImg.src = backImg;
        
        // 3. تغيير نصوص الأزرار
        if(label2) btn2Label.innerText = label2;
        if(label3) btn3Label.innerText = label3;

        // 4. السحر هنا: تغيير وظيفة الأزرار للمرحلة القادمة
        if(nextAction2) btn2.setAttribute('onclick', nextAction2);
        if(nextAction3) btn3.setAttribute('onclick', nextAction3);
        
    }, 300);
}
