    <style>
        :root {
            --dark-bg: #0f0f0f;
            --gold: #bfa071;
            --text: #e0e0e0;
            --card-bg: rgba(30, 30, 30, 0.9);
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text);
            font-family: 'Amiri', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* العنوان العلوي (TXT في رسمك) */ 
        .game-title {
    font-family: 'Cinzel', serif; /* الخط الجديد */
    font-size: 3.5rem;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(191, 160, 113, 0.6);
    margin-top: 80px;
    margin-bottom: 70px;
    letter-spacing: 8px;
    font-weight: 700;
}
        /* حاوية الملفات أو القضايا */
        .cases-container {
            display: flex;
            flex-direction: column;
            gap: 25px;
            width: 100%;
            max-width: 800px;
            padding-bottom: 100px;


          
        }


        /* تصميم المستطيل (البطاقة) من رسمك */
        .case-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(191, 160, 113, 0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 20px;
            gap: 20px;
            transition: transform 0.3s, border-color 0.3s;
        }

        .case-card:hover {
            transform: scale(1.02);
            border-color: var(--gold);
        }

        /* قسم الصورة في البطاقة */
        .case-image {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--gold);
            flex-shrink: 0; /* يمنع الصورة من الصغر */
        }

        /* قسم النصوص */
        .case-info {
            flex-grow: 1;
        }

        .case-info h2 {
            margin: 0 0 10px 0;
            color: var(--gold);
        }

        .case-info p {
            margin: 0;
            font-size: 0.95rem;
            color: #bbb;
            line-height: 1.5;
        }

        /* زر ابدأ */
        .start-btn {
            background: transparent;
            color: var(--gold);
            border: 2px solid var(--gold);

            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .start-btn:hover {
            background: var(--gold);
            color: black;
        }
        /* تأثير الأيقونات الساقطة في الخلفية */
.background-elements {
    position: fixed;
    top: -50px;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1; /* لتكون خلف كل شيء */
    overflow: hidden;
    pointer-events: none;
}

.emoji {
    position: absolute;
    color: rgba(191, 160, 113, 0.2); /* لون ذهبي شفاف جداً */
    font-size: 24px;
    user-select: none;
    animation: fall linear infinite;
    filter: drop-shadow(0 0 5px rgba(191, 160, 113, 0.5)); /* تأثير اللمعان */
}

/* تنسيق الرموز المتساقطة (الخلفية) */
.emoji {
    position: fixed;
    top: -50px;
    z-index: -1; /* ليكون خلف البطاقات */
    user-select: none;
    pointer-events: none;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh) rotate(360deg);
    }
}

/* تنسيق الشاشة السوداء (The Overlay) */
#message-overlay {
    display: none; /* مخفية في البداية */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.98); /* سواد فخم */
    z-index: 9999; /* ليكون فوق كل شيء */

    align-items: center;
    flex-direction: column;
}

/* محتوى الرسالة الذهبية */

#overlay-text {

}

}

}

/* الكومة */

}

@keyframes fall {
    0% {
        transform: translateY(0) rotate(0deg);

    }
    10% { opacity: 1; }

/* الحاوية التي تعطي تأثير البعد الثالث */

/* الحاوية التي تدور فعلياً */

    </style>

    <script>

        let typingTimer; // متغير للتحكم في سرعة الكتابة وإيقافها عند الحاجة

function typeWriter(text, elementId, speed) {
    let i = 0;
    const element = document.getElementById(elementId);
    element.innerHTML = ""; // تفريغ النص القديم قبل البدء
    
    // إيقاف أي عملية كتابة سابقة إذا ضغط المستخدم بسرعة
    clearTimeout(typingTimer);

    function type() {
        if (i < text.length) {
            element.innerHTML += text.charAt(i);
            i++;
            typingTimer = setTimeout(type, speed);
        }
    }
    type();
}


function closeOverlay() {
    document.getElementById('message-overlay').style.display = "none";
    clearTimeout(typingTimer); // إيقاف الكتابة إذا أغلق المستخدم الشاشة

    }

// دالة لقلب البطاقة عند النقر عليها

    typeWriter(message, "overlay-text", 50); 
}

}

  // --- جزء الرموز المتساقطة (The Emojis) ---
const bgContainer = document.getElementById('bg-elements');
const emojis = ['🕵️', '🔍', '🔑', '📜', '⚖️', '🩸'];

function createEmoji() {
    const emoji = document.createElement('div');
    emoji.classList.add('emoji');
    
    // اختيار إيموجي عشوائي
    emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
    
    // مكان الظهور العشوائي (من اليسار لليمين)
    emoji.style.left = Math.random() * 100 + "vw";
    
    // سرعة السقوط العشوائية (بين 5 و 15 ثانية)
    const duration = Math.random() * 10 + 5;
    emoji.style.animationDuration = duration + "s";
    
    // حجم عشوائي
    emoji.style.fontSize = Math.random() * 20 + 20 + "px";
    
    bgContainer.appendChild(emoji);
    
    // حذف العنصر بعد انتهاء الحركة لتوفير الذاكرة
    setTimeout(() => {
        emoji.remove();
    }, duration * 1000);
}

// صنع إيموجي جديد كل 500 ملي ثانية
setInterval(createEmoji, 500);




// دالة إغلاق الشاشة السوداء والعودة للواجهة
function closeOverlay() {

}


function changeCard(newImagePath, description) {
    const backImg = document.getElementById('back-img');
    const cardInner = document.getElementById('card-inner');
    const textElement = document.getElementById('overlay-text');

    // 1. إذا كانت البطاقة مقلوبة، نعيدها لوضعها الأول أولاً
    cardInner.classList.remove('is-flipped');

    // 2. ننتظر قليلاً ثم نغير المحتوى
    setTimeout(() => {
        backImg.src = newImagePath;
        textElement.innerText = "لقد اخترت: " + description;
    }, 300);
}
